<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paquito Hub — Panel de administración con IA local, control OpenClaw, y monitorización del sistema">
    <title>🧠 Paquito Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <div class="app-container">

        <!-- ── Header ── -->
        <header class="header">
            <div class="header-left">
                <span class="header-logo">🧠</span>
                <div>
                    <div class="header-title">Paquito Hub</div>
                    <div class="header-subtitle">Control Center</div>
                </div>
            </div>
            <div class="server-status">
                <span class="status-dot" id="server-dot"></span>
                <span>Server <strong id="server-label">...</strong></span>
            </div>
        </header>

        <!-- ── Metrics CT 102 ── -->
        <h3 style="margin-bottom: 15px; color: var(--text-secondary); font-size: 0.9rem; padding-left: 5px;">🖥️ HUB SERVER (CT 102)</h3>
        <section class="metrics-grid">
            <div class="metric-card" onclick="runAction('check_hub_ram')">
                <div class="metric-icon">💾</div>
                <div class="metric-label">RAM Hub</div>
                <div class="metric-value loading" id="metric-ram">...</div>
            </div>
            <div class="metric-card" onclick="runAction('check_hub_disk')">
                <div class="metric-icon">💿</div>
                <div class="metric-label">Disco Hub</div>
                <div class="metric-value loading" id="metric-disk">...</div>
            </div>
            <div class="metric-card" onclick="runAction('check_dns')">
                <div class="metric-icon">🌐</div>
                <div class="metric-label">DNS Hub</div>
                <div class="metric-value loading" id="metric-dns">...</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">🤖</div>
                <div class="metric-label">Ollama</div>
                <div class="metric-value loading" id="metric-ollama">...</div>
            </div>
        </section>

        <!-- ── Metrics CT 103 ── -->
        <h3 style="margin-bottom: 15px; margin-top: 10px; color: var(--text-secondary); font-size: 0.9rem; padding-left: 5px;">🧠 PAQUITO (CT 103 - SSH)</h3>
        <section class="metrics-grid">
            <div class="metric-card" onclick="runAction('check_paquito_status')">
                <div class="metric-icon">🔌</div>
                <div class="metric-label">Estado OpenClaw</div>
                <div class="metric-value loading" id="metric-paquito-status">...</div>
            </div>
            <div class="metric-card" onclick="runAction('check_paquito_ram')">
                <div class="metric-icon">💾</div>
                <div class="metric-label">RAM Paquito</div>
                <div class="metric-value loading" id="metric-paquito-ram">...</div>
            </div>
            <div class="metric-card" onclick="runAction('check_paquito_disk')">
                <div class="metric-icon">💿</div>
                <div class="metric-label">Disco Paquito</div>
                <div class="metric-value loading" id="metric-paquito-disk">...</div>
            </div>
            <div class="metric-card" onclick="runAction('check_paquito_dns')">
                <div class="metric-icon">🌐</div>
                <div class="metric-label">DNS Paquito</div>
                <div class="metric-value loading" id="metric-paquito-dns">...</div>
            </div>
        </section>

        <!-- ── Main Panels ── -->
        <section class="panels-grid">

            <!-- OpenClaw Control -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">🔧 OpenClaw Control</span>
                    <span class="panel-badge badge-loading" id="openclaw-badge">CHECKING</span>
                </div>
                <div class="panel-body">
                    <div class="control-grid">
                        <button class="control-btn danger" onclick="ocRestart()" id="btn-oc-restart">🔄 Reiniciar OpenClaw</button>
                        <button class="control-btn primary" onclick="ocLogs()" id="btn-oc-logs">📜 Ver Logs (SSH)</button>
                        <button class="control-btn primary" onclick="runAction('check_paquito_status')" id="btn-oc-status">📊 Estado Remoto</button>
                    </div>
                </div>
            </div>

            <!-- AI Terminal -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">🤖 Terminal IA</span>
                    <span class="panel-badge badge-online">PAQUITO</span>
                </div>
                <div class="panel-body">
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Escribe un comando o pregunta..." autocomplete="off">
                        <button class="chat-send" id="chat-send-btn" onclick="sendChat()">Enviar</button>
                    </div>
                </div>
            </div>

        </section>

        <!-- ── Console Output ── -->
        <section class="panel console-panel">
            <div class="panel-header">
                <span class="panel-title">📟 Console Output</span>
                <button class="control-btn" onclick="consoleClear()" style="padding:6px 14px;font-size:0.72rem;" id="btn-clear-console">Limpiar</button>
            </div>
            <div class="panel-body">
                <div class="console-output" id="console-output"></div>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
